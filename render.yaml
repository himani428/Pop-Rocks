services:
  - type: web
    name: pop-rocks-backend
    runtime: node
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: http://localhost:5173
      - key: PORT
        value: 5000
      - key: OWNER_EMAIL
        value: muskanwadhwani1324@gmail.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false