services:
  - type: web
    name: pop-rocks-backend
    runtime: node
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: http://localhost:5173
      - key: PORT
        value: 5000
